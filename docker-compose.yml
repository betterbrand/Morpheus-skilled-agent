services:
  ops-agent:
    image: morpheus-node-manager
    build: .
    restart: unless-stopped
    volumes:
      - ./config.json:/config/config.json:ro
      - ops-agent-data:/root
    environment:
      - NODE_ENV=production
    # Runs --once on each container start; paired with restart: unless-stopped
    # this gives cron-like behavior via the checkIntervalMs in config.json.
    # Alternatively, set the CMD to daemon mode (remove --once) for a long-running container.

volumes:
  ops-agent-data:
